[SETTINGS]
; Interface language: ru, en or es
language = ru

; IP address to bind to:
;   127.0.0.1 - local only (recommended; publish publicly via a reverse proxy like Caddy)
;   0.0.0.0   - listen on all network interfaces
host = 127.0.0.1

; Port to be used for the application.
port = 3001

; Automatic data refresh interval, in seconds (0 disables).
; game.db is read this often; there is no manual Refresh button in the UI.
auto_refresh = 300

; Guild names (comma-separated, SQL LIKE: % = any, _ = one char) whose buildings
; are treated as decay-protected and skip the decay timer. Default: %ADMIN%,%Админ%
; admin_guilds = %ADMIN%,%Админ%

; ─────────────────────────────────────────────────
; Define each game server in a [SERVER_<id>] section.
; Use forward slashes in paths (e.g. C:/GameServers/server1/game.db)
; ─────────────────────────────────────────────────

[SERVER_server1]
name = Server 1
database = game.db

; [SERVER_server2]
; name = Server 2
; database = C:/GameServers/server2/game.db

[AUTH]
; Admin accounts. Viewing the map is public; logging in unlocks admin features.
; This section is REQUIRED and must contain at least one valid entry, otherwise
; the app refuses to start.
;
; Each value is a scrypt password hash (the plaintext password is never stored).
; Generate one with:   npm run set-password <password>
;   (password policy: >=16 chars, with lowercase, uppercase and a digit)
; then paste the printed line here, e.g.:
;
; admin   = scrypt$<salt>$<hash>
; admin2  = scrypt$<salt>$<hash>
